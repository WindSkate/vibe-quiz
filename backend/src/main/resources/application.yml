spring:
  application:
    name: quiz-game

  datasource:
    url: jdbc:postgresql://localhost:5432/quiz
    username: quiz
    password: quiz
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  storage:
    location: storage

server:
  port: 8080
