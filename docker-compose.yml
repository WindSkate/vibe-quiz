services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: quiz
      POSTGRES_USER: quiz
      POSTGRES_PASSWORD: quiz
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/quiz
      SPRING_DATASOURCE_USERNAME: quiz
      SPRING_DATASOURCE_PASSWORD: quiz
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    volumes:
      - storage:/app/storage

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  redirect:
    build: ./redirect
    ports:
      - "80:80"

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      device: ./.data/postgres_data
      o: bind
  storage:
    driver: local
    driver_opts:
      type: none
      device: ./.data/storage
      o: bind
